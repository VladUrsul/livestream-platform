version: '3.9'

services:

  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB:       auth_db
      POSTGRES_USER:     auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-db:
    image: postgres:16-alpine
    container_name: user-db
    environment:
      POSTGRES_DB:       user_db
      POSTGRES_USER:     user_user
      POSTGRES_PASSWORD: user_pass
    ports:
      - "5434:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_user -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5


  stream-db:
    image: postgres:16-alpine
    container_name: stream-db
    environment:
      POSTGRES_DB:       stream_db
      POSTGRES_USER:     stream_user
      POSTGRES_PASSWORD: stream_pass
    ports:
      - "5433:5432"
    volumes:
      - stream-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stream_user -d stream_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  chat-db:
    image: postgres:16-alpine
    container_name: chat-db
    environment:
      POSTGRES_DB:       chat_db
      POSTGRES_USER:     chat_user
      POSTGRES_PASSWORD: chat_pass
    ports:
      - "5435:5432"
    volumes:
      - chat-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_user -d chat_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  notification-db:
    image: postgres:16-alpine
    container_name: notification-db
    environment:
      POSTGRES_DB:       notification_db
      POSTGRES_USER:     notif_user
      POSTGRES_PASSWORD: notif_pass
    ports:
      - "5436:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notif_user -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_pass
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_pass", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: rabbit_user
      RABBITMQ_DEFAULT_PASS: rabbit_pass
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      STREAM_SERVICE_URL: http://stream-service:8083
      CHAT_SERVICE_URL: http://chat-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - auth-service
    restart: unless-stopped

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT:             "8081"
      RABBITMQ_URL: amqp://rabbit_user:rabbit_pass@rabbitmq:5672/
      AUTH_EXCHANGE: auth.events
      DB_HOST:                 auth-db
      DB_PORT:                 "5432"
      DB_USER:                 auth_user
      DB_PASSWORD:             auth_pass
      DB_NAME:                 auth_db
      DB_SSLMODE:              disable
      REDIS_HOST:              redis
      REDIS_PORT:              "6379"
      REDIS_PASSWORD:          redis_pass
      JWT_ACCESS_SECRET:       change-this-in-production
      JWT_REFRESH_SECRET:      change-this-too-in-production
      JWT_ACCESS_EXPIRY_MINS:  "15"
      JWT_REFRESH_EXPIRY_DAYS: "7"
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
  
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT:       "8082"
      DB_HOST:           user-db
      DB_PORT:           "5432"
      DB_USER:           user_user
      DB_PASSWORD:       user_pass
      DB_NAME:           user_db
      DB_SSLMODE:        disable
      RABBITMQ_URL:      amqp://rabbit_user:rabbit_pass@rabbitmq:5672/
      AUTH_EXCHANGE:     auth.events
      STREAM_EXCHANGE:   stream.events
      USER_EXCHANGE:     user.events
      USER_QUEUE_NAME:   user-service.events
      JWT_ACCESS_SECRET: change-this-in-production
    depends_on:
      user-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
  
  stream-service:
    build:
      context: ./services/stream-service
      dockerfile: Dockerfile
    container_name: stream-service
    ports:
      - "8083:8083"
      - "1935:1935"
    environment:
      SERVER_PORT:       "8083"
      DB_HOST:           stream-db
      DB_PORT:           "5432"
      DB_USER:           stream_user
      DB_PASSWORD:       stream_pass
      DB_NAME:           stream_db
      DB_SSLMODE:        disable
      REDIS_HOST:        redis
      REDIS_PORT:        "6379"
      REDIS_PASSWORD:    redis_pass
      RTMP_PORT:         "1935"
      RTMP_BASE_URL:     rtmp://localhost:1935/live
      HLS_OUTPUT_DIR:    /tmp/hls
      HLS_BASE_URL:      http://localhost:8083/hls
      RABBITMQ_URL:      amqp://rabbit_user:rabbit_pass@rabbitmq:5672/
      JWT_ACCESS_SECRET: change-this-in-production
    depends_on:
      stream-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  chat-service:
    build:
      context: ./services/chat-service
      dockerfile: Dockerfile
    container_name: chat-service
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT:       "8084"
      DB_HOST:           chat-db
      DB_PORT:           "5432"
      DB_USER:           chat_user
      DB_PASSWORD:       chat_pass
      DB_NAME:           chat_db
      DB_SSLMODE:        disable
      RABBITMQ_URL:      amqp://rabbit_user:rabbit_pass@rabbitmq:5672/
      CHAT_EXCHANGE:     chat.events
      JWT_ACCESS_SECRET: change-this-in-production
    depends_on:
      chat-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT:          "8085"
      DB_HOST:              notification-db
      DB_PORT:              "5432"
      DB_USER:              notif_user
      DB_PASSWORD:          notif_pass
      DB_NAME:              notification_db
      DB_SSLMODE:           disable
      RABBITMQ_URL:         amqp://rabbit_user:rabbit_pass@rabbitmq:5672/
      USER_EXCHANGE:        user.events
      STREAM_EXCHANGE:      stream.events
      NOTIFICATION_QUEUE:   notification-service.events
      JWT_ACCESS_SECRET:    change-this-in-production
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8080/api/v1
    depends_on:
      - auth-service

volumes:
  auth-db-data:
  stream-db-data:
  user-db-data:
  chat-db-data:
  notification-db-data: